apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: krishnapuppala20/backend:lat
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "200m"
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "mongodb://mongodb:27017"
            - name: DATABASE_NAME
              value: "ead_ca2"
            - name: DATABASE_COLLECTION
              value: "ead_2024"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1