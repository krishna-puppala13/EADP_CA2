apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "22137"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 22137
      targetPort: 22137
      nodePort: 30007