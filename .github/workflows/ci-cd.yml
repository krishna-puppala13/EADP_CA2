name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ─────────────────────────────
  # JOB 1: BUILD + SCAN + PUSH
  # ─────────────────────────────
  build-scan-push:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build Backend Image
        run: docker build -t krishnapuppala20/backend:lat ./BACK_END

      - name: Build Frontend Image
        run: docker build -t krishnapuppala20/frontend:lat ./FRONT_END

      - name: Install Trivy
        run: choco install trivy -y

      - name: Scan Backend Image
        run: trivy image --format table -o backend-report.txt krishnapuppala20/backend:lat

      - name: Scan Frontend Image
        run: trivy image --format table -o frontend-report.txt krishnapuppala20/frontend:lat

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            backend-report.txt
            frontend-report.txt

      - name: Push Backend
        run: docker push krishnapuppala20/backend:lat

      - name: Push Frontend
        run: docker push krishnapuppala20/frontend:lat


  # ─────────────────────────────
  # JOB 2: TERRAFORM
  # ─────────────────────────────
  terraform:
    runs-on: self-hosted
    needs: build-scan-push

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Kubernetes
        run: kubectl get nodes

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan


  # ─────────────────────────────
  # JOB 3: ROLLOUT + VALIDATION + ROLLBACK
  # ─────────────────────────────
  rollout-validate:
    runs-on: self-hosted
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy Backend (with rollback)
        run: |
          kubectl rollout status deployment/backend --timeout=60s
          if ($LASTEXITCODE -ne 0) {
            echo "Backend deployment failed. Rolling back..."
            kubectl rollout undo deployment/backend
            exit 1
          }

      - name: Deploy Frontend (with rollback)
        run: |
          kubectl rollout status deployment/frontend --timeout=60s
          if ($LASTEXITCODE -ne 0) {
            echo "Frontend deployment failed. Rolling back..."
            kubectl rollout undo deployment/frontend
            exit 1
          }

      - name: Check Pods
        run: kubectl get pods


  # ─────────────────────────────
  # JOB 4: MONITORING
  # ─────────────────────────────
  monitoring:
    runs-on: self-hosted
    needs: rollout-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Add Helm Repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Install Monitoring Stack
        run: helm upgrade --install monitoring prometheus-community/kube-prometheus-stack --set grafana.adminPassword=admin123

      - name: Show Monitoring Access
        run: |
          echo "========== MONITORING =========="
          echo "Run this command to open Grafana:"
          echo "minikube service monitoring-grafana"
          echo ""
          echo "Run this command to open Prometheus:"
          echo "minikube service monitoring-kube-prometheus-prometheus"
          echo "================================"